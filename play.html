<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glvsowogame — Terminal Masuk</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root{
    --bg-deep:#0c0000;
    --bg-panel:#1a0202;
    --bg-card:#2d0505;
    --blue:#ff3b3b;
    --blue-soft:#ff6b6b;
    --pink:#ff2d55;
    --gold:#ffd60a;
    --white:#ffeded;
    --mute:#c9b1b1;
    --line:rgba(255,59,59,0.18);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    background:var(--bg-deep);
    color:var(--white);
    font-family:'Inter', sans-serif;
    overflow-x:hidden;
    position:relative;
    min-height:100vh;
  }

  /* ambient bg */
  .bg-glow{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(ellipse 700px 500px at 15% 10%, rgba(77,127,255,0.20), transparent 60%),
      radial-gradient(ellipse 600px 600px at 90% 25%, rgba(255,143,203,0.14), transparent 60%),
      radial-gradient(ellipse 800px 500px at 50% 100%, rgba(255,209,102,0.08), transparent 60%);
  }
  .starfield{ position:fixed; inset:0; z-index:0; pointer-events:none; }
  .star{
    position:absolute; width:3px; height:3px; border-radius:50%;
    background:var(--white); opacity:.5;
    animation:twinkle 3.5s ease-in-out infinite;
  }
  @keyframes twinkle{ 0%,100%{opacity:.15; transform:scale(1);} 50%{opacity:.9; transform:scale(1.4);} }

  ::selection{ background:var(--blue); color:#fff; }
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="starfield" id="starfield"></div>

<script>
  // generate starfield
  const sf = document.getElementById('starfield');
  for(let i=0;i<60;i++){
    const s = document.createElement('div');
    s.className='star';
    s.style.top = Math.random()*100+'%';
    s.style.left = Math.random()*100+'%';
    s.style.animationDelay = (Math.random()*3.5)+'s';
    s.style.width = s.style.height = (Math.random()*2+1.5)+'px';
    sf.appendChild(s);
  }
</script>

<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
